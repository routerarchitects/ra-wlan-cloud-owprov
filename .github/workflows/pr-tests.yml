name: PR Tests

on:
  pull_request:
    branches:
      - main
      - 'release/*'
  push:
    branches:
      - main
      - 'release/*'

defaults:
  run:
    shell: bash

jobs:
  rbac-python-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run RBAC contract tests
        run: |
          python3 test_scripts/integration/test_rbac_scope_contract.py
          python3 test_scripts/integration/test_rbac_scope_api.py
