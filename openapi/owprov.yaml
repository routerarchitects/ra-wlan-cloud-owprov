          required: false
        - in: query
          name: entity
          schema:
            type: string
            format: uuid
          required: false
      responses:
        200:
          description: Return a list of contacts
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ContactList'
                  - $ref: '#/components/schemas/CountAnswer'
