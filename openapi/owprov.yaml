              schema:
                oneOf:
                  - $ref: '#/components/schemas/SerialNumberList'
                  - $ref: '#/components/schemas/InventoryTagList'
                  - $ref: '#/components/schemas/CountAnswer'
                  - $ref: '#/components/schemas/StringList'
