  /inventory:
    get:
      tags:
        - Inventory
      operationId: getInventoryTags
      summary: Retrieve a list of inventory.
      parameters:
        - in: query
          name: entity
          schema:
            type: string
            format: uuid
          required: false
        - in: query
          name: venue
          schema:
            type: string
            format: uuid
          required: false
        - in: query
          description: 'How many items to skip from the start (default: 0).'
          name: offset
          schema:
            type: integer
          required: false
        - in: query
          description: Maximum number of entries to return (if absent, no limit is assumed)
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          description: Supply a comma-separated list of device IDs
          name: select
          schema:
            type: string
            example: serial1,serial2,serial3
          required: false
        - in: query
          description: only serial numbers of full device details
          name: serialOnly
          schema:
            type: boolean
          required: false
        - in: query
          description: return the number of devices
          name: countOnly
          schema:
            type: boolean
          required: false
        - in: query
          description: return extended information
          name: withExtendedInfo
          schema:
            type: boolean
          required: false
        - in: query
          description: return extended information
          name: orderBy
          schema:
            type: string
            example: serialNumber:a,created:d
          required: false
        - in: query
          description: return extended information
          name: orderSpec
          schema:
            type: boolean
            default: false
          required: false
        - in: query
          description: return the list of devices under RRM
          name: rrmOnly
          schema:
            type: boolean
            default: false
          required: false
