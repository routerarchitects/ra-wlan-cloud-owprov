      summary: Retrieve a specific inventory tag.
      parameters:
        - in: path
          name: serialNumber
          schema:
            type: string
            format: uuid
          required: true
        - in: query
          name: config
          schema:
            type: boolean
          required: false
        - in: query
          name: explain
          schema:
            type: boolean
          required: false
        - in: query
          name: firmwareOptions
          schema:
            type: boolean
          required: false
        - in: query
          name: applyConfiguration
          schema:
            type: boolean
          required: false
        - in: query
          description: return RRM settings for a specific device
          name: rrmSettings
          schema:
            type: boolean
            default: false
          required: false
        - in: query
          description: return the resolved configuration for a specific device
          name: resolveConfig
          schema:
            type: boolean
            default: false
          required: false
      responses:
        200:
          description: Succesful retrieve configuratiopn or part of the configuration
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InventoryTag'
                  - $ref: '#/components/schemas/FirmwareOptions'
                  - $ref: '#/components/schemas/InventoryConfigApplyResult'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Inventory
      operationId: createInventory
      summary: Create a specific Inventory.
      parameters:
        - in: path
          name: serialNumber
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        description: Information used to create the new entity
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryTag'
      responses:
        200:
          $ref: '#/components/schemas/InventoryTag'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'
