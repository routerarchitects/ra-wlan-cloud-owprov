openapi: 3.0.1
info:
  title: OpenWiFi Provisioning Model
  description: Definitions and APIs to manages an OpenWiFi network.
  version: 1.0.0
  license:
    name: BSD3
    url: https://github.com/Telecominfraproject/wlan-cloud-ucentralgw/blob/master/LICENSE

servers:
  - url: 'https://localhost:16005/api/v1'

security:
  - bearerAuth: []
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            type: object
            properties:
              errorCode:
                type: integer
              errorDetails:
                type: string
    Unauthorized:
      description: Unauthorized request.
      content:
        application/json:
          schema:
            type: object
            properties:
              errorCode:
                type: integer
              errorDetails:
                type: string
    Success:
      description: Successful operation.
    BadRequest:
      description: Invalid or missing parameters.
      content:
        application/json:
          schema:
            type: object
            properties:
              errorCode:
                type: integer
              errorDetails:
                type: string

  schemas:

    ObjectInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        notes:
          type: array
          items:
            $ref: '#/components/schemas/NoteInfo'
        created:
          type: integer
          format: int64
        modified:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: integer
            format: int64

    # uuids: mpe:<uuid>
    ManagementPolicyEntry:
      type: object
      properties:
        users:
          type: array
          items:
            type: string
        resources:
          description: this is a list of UUID and UUID Patterns to control by this policy
          type: array
          items:
            type: string
        access:
          type: array
          items:
            type: string
            enum:
              - NOACCESS
              - READ
              - MODIFY
              - DELETE
              - LIST
              - CREATE
              - FULL
        policy:
          description: A JSON document describing the policy
          type: string

    # uuids: mpp:<uuid>
    ManagementPolicy:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ManagementPolicyEntry'
        inUse:
          type: array
          items:
            type: string
            format: uuid
            example: each uuid is preceded by ent, or ven to say that the elemenet is entity or venue
        entity:
          type: string
          format: uuid
        venue:
          type: string
          format: uuid

    ManagementPolicyList:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: '#/components/schemas/ManagementPolicy'

    DeviceRules:
      type: object
      properties:
        rcOnly:
          type: string
          enum:
            - yes
            - no
            - inherit
        rrm:
          type: string
          enum:
            - yes
            - no
            - inherit
        firmwareUpgrade:
          type: string
          enum:
            - yes
            - no
            - inherit

    # uuids: ent:<uuid>
    Entity:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        parent:
          description: If empty, then this is the root entity, otherwise this points to a parent entity
          type: string
          format: uuid
        operatorId:
          description: Operator owner of this entity (set automatically for operator-scoped entities)
          type: string
          format: uuid
          readOnly: true
        children:
          type: array
          items:
            type: string
            format: uuid
        venues:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        contacts:
          description: The list of UUID of the contacts for the entity
          type: array
          items:
            type: string
            format: uuid
        locations:
          description: The list of UUID of the locations associated with thit entiry
          type: array
          items:
            type: string
            format: uuid
        managementPolicy:
          type: string
          format: uuid
        deviceConfiguration:
          type: string
          format: uuid
        devices:
          type: array
          items:
            type: string
            format: uuid
        managementPolicies:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        variables:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        managementRoles:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        maps:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        configurations:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        deviceRules:
          $ref: '#/components/schemas/DeviceRules'
        sourceIP:
          $ref: '#/components/schemas/StringList'
        defaultEntity:
          type: boolean
          default: false
        type:
          type: string
          enum:
            - normal
            - subscriber
          default: normal

    EntityList:
      type: object
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/Entity'

    DiGraphEntry:
      type: object
      properties:
        parent:
          type: string
          format: uuid
        child:
          type: string
          format: uuid

    DiGraph:
      type: array
      items:
        $ref: '#/components/schemas/DiGraphEntry'

    # uuids: ven:<uuid>
    Venue:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        entity:
          type: string
          format: uuid
        parent:
          type: string
          format: uuid
        children:
          type: array
          items:
            type: string
            format: uuid
        managementPolicy:
          type: string
          format: uuid
        devices:
          type: array
          items:
            type: string
            format: uuid
        topology:
          $ref: '#/components/schemas/DiGraph'
        design:
          type: string
        deviceConfiguration:
          type: string
          format: uuid
        contacts:
          type: array
          items:
            type: string
            format: uuid
        location:
          type: string
          format: uuid
        deviceRules:
          $ref: '#/components/schemas/DeviceRules'
        sourceIP:
          $ref: '#/components/schemas/StringList'
        managementPolicies:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        managementRoles:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        variables:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        maps:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        configurations:
          description: The list of UUID of the venues for this entity
          type: array
          items:
            type: string
            format: uuid
        boards:
          description: The list of OWAnalytics Boards created for this venue
          type: array
          items:
            type: string
            format: uuid

    VenueList:
      type: object
      properties:
        venues:
          type: array
          items:
            $ref: '#/components/schemas/Venue'

    UserInfoDigest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        loginId:
          type: string
        type:
          type: string

    # uuids: mgg:<uuid>
    ManagementRole:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        managementPolicy:
          type: string
          format: uuid
        users:
          type: array
          items:
            type: string
            format: uuid
        inUse:
          type: array
          items:
            type: string
            format: uuid
            example: each uuid is preceded by ent, or ven to say that the elemenet is entity or venue
        entity:
          type: string
          format: uuid
        venue:
          type: string
          format: uuid

    ManagementRoleList:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/ManagementRole'

    # uuids: loc:<uuid>
    Location:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        type:
          type: string
          enum:
            - SERVICE
            - EQUIPMENT
            - AUTO
            - MANUAL
            - SPECIAL
            - UNKNOWN
            - CORPORATE
        buildingName:
          type: string
        addressLines:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postal:
          type: string
        country:
          type: string
        phones:
          type: array
          items:
            type: string
        mobiles:
          type: array
          items:
            type: string
        inUse:
          type: array
          items:
            type: string
            format: uuid
            example: each uuid is preceded by ent, or ven to say that the elemenet is entity or venue
        entity:
          type: string
          format: uuid
        managementPolicy:
          type: string
          format: uuid
        geoCode:
          type: string

    LocationList:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    OperatorLocation:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        type:
          type: string
          enum:
            - SERVICE
            - EQUIPMENT
            - AUTO
            - MANUAL
            - SPECIAL
            - UNKNOWN
            - CORPORATE
        buildingName:
          type: string
        addressLines:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postal:
          type: string
        country:
          type: string
        phones:
          type: array
          items:
            type: string
        mobiles:
          type: array
          items:
            type: string
        operatorId:
          type: string
          format: uuid
        subscriberDeviceId:
          type: string
          format: uuid
        geoCode:
          type: string

    OperatorLocationList:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/OperatorLocation'

    SubLocation:
      type: object
      properties:
        type:
          type: string
          enum:
            - SERVICE
            - EQUIPMENT
            - AUTO
            - MANUAL
            - SPECIAL
            - UNKNOWN
            - CORPORATE
        buildingName:
          type: string
        addressLines:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postal:
          type: string
        country:
          type: string
        phones:
          type: array
          items:
            type: string
        mobiles:
          type: array
          items:
            type: string
        geoCode:
          type: string

    # uuids: con:<uuid>
    Contact:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        type:
          type: string
          enum:
            - SUBSCRIBER
            - USER
            - INSTALLER
            - CSR
            - MANAGER
            - BUSINESSOWNER
            - TECHNICIAN
            - CORPORATE
        title:
          type: string
        salutation:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        initials:
          type: string
        visual:
          type: string
        phones:
          type: array
          items:
            type: string
        mobiles:
          type: array
          items:
            type: string
        primaryEmail:
          type: string
        secondaryEmail:
          type: string
        accessPIN:
          type: string
        inUse:
          type: array
          items:
            type: string
            format: uuid
        entity:
          type: string
          format: uuid
        managementPolicy:
          type: string
          format: uuid

    ContactList:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/Contact'

    OperatorContact:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        type:
          type: string
          enum:
            - SUBSCRIBER
            - USER
            - INSTALLER
            - CSR
            - MANAGER
            - BUSINESSOWNER
            - TECHNICIAN
            - CORPORATE
        title:
          type: string
        salutation:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        initials:
          type: string
        visual:
          type: string
        phones:
          type: array
          items:
            type: string
        mobiles:
          type: array
          items:
            type: string
        primaryEmail:
          type: string
        secondaryEmail:
          type: string
        accessPIN:
          type: string
        operatorId:
          type: string
          format: uuid
        subscriberDeviceId:
          type: string
          format: uuid

    OperatorContactList:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/OperatorContact'

    SubContact:
      type: object
      properties:
        type:
          type: string
          enum:
            - SUBSCRIBER
            - USER
            - INSTALLER
            - CSR
            - MANAGER
            - BUSINESSOWNER
            - TECHNICIAN
            - CORPORATE
        title:
          type: string
        salutation:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        initials:
          type: string
        visual:
          type: string
        phones:
          type: array
          items:
            type: string
        mobiles:
          type: array
          items:
            type: string
        primaryEmail:
          type: string
        secondaryEmail:
          type: string
        accessPIN:
          type: string

    DeviceConfigurationElement:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        weight:
          type: integer
        configuration:
          type: string

    DeviceConfiguration:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        managementPolicy:
          type: string
          format: uuid
        deviceTypes:
          type: array
          items:
            type: string
        configuration:
          type: array
          items:
            $ref: '#/components/schemas/DeviceConfigurationElement'
        variables:
          type: array
          items:
            type: string
            format: uuid
        inUse:
          type: array
          items:
            type: string
            format: uuid
        subscriberOnly:
          type: boolean
          default: false
        deviceRules:
          $ref: '#/components/schemas/DeviceRules'
        venue:
          type: string
          format: uuid
        entity:
          type: string
          format: uuid
        subscriber:
          type: string
          format: uuid

    DeviceConfigurationList:
      type: object
      properties:
        configurations:
          type: array
          items:
            $ref: '#/components/schemas/DeviceConfiguration'

    InventoryTag:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        serialNumber:
          type: string
        deviceType:
          type: string
        venue:
          type: string
          format: uuid
        entity:
          type: string
          format: uuid
        subscriber:
          type: string
          format: uuid
        qrCode:
          type: string
        geoCode:
          type: string
        location:
          type: string
          format: uuid
        contact:
          type: string
          format: uuid
        deviceConfiguration:
          type: string
          format: uuid
          description: Configuration UUID linked to this inventory device.
        deviceRules:
          $ref: '#/components/schemas/DeviceRules'
        managementPolicy:
          type: string
          format: uuid
        state:
          type: string
        devClass:
          type: string
          enum:
            - any
            - venue
            - entity
            - subscriber
        locale:
          type: string
          minLength: 2
          maxLength: 2
        imported:
          type: integer
          format: int64
        connected:
          type: integer
          format: int64
        platform:
          type: string
          enum:
            - AP
            - SWITCH

    VenueDeviceList:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        devices:
          type: array
          items:
            type: string

    InventoryTagList:
      type: object
      properties:
        taglist:
          type: array
          items:
            $ref: '#/components/schemas/InventoryTag'

    SerialNumberList:
      type: object
      properties:
        serialNumbers:
          type: array
          items:
            type: string

    CountAnswer:
      type: object
      properties:
        count:
          type: integer
          format: int64

    ExpandedUseEntry:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    ExpandedUseEntryMap:
      type: object
      properties:
        type:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ExpandedUseEntry'

    ExpandedUseEntryMapList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ExpandedUseEntryMap'

    FirmwareOptions:
      type: object
      properties:
        firmwareUpgrade:
          type: string
          example: auto or a time string of the format DOW-HH:MM
        firmwareRCOnly:
          type: boolean
        from:
          type: string

    InventoryConfigApplyResult:
      type: object
      properties:
        appliedConfiguration:
          type: string
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        errorCode:
          type: integer

    uuidList:
      type: object
      properties:
        list:
          type: array
          items:
            type: string
            format: uuid

    ObjectACL:
      type: object
      properties:
        users:
          $ref: '#/components/schemas/uuidList'
        roles:
          $ref: '#/components/schemas/uuidList'
        access:
          type: string
          enum:
            - none
            - read
            - modify
            - delete
            - create

    ObjectACLList:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/ObjectACL'

    Map:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        entity:
          type: string
          format: uuid
        venue:
          type: string
          format: uuid
        managementPolicy:
          type: string
          format: uuid
        data:
          type: string
        visibility:
          type: string
          enum:
            - private
            - public
            - select
        creator:
          type: string
          format: uuid
        access:
          $ref: '#/components/schemas/ObjectACLList'

    MapList:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Map'


    SignupEntry:
      allOf:
        - $ref: '#/components/schemas/ObjectInfo'
        - type: object
          properties:
            email:
              type: string
              format: email
            userId:
              type: string
              format: uuid
            operatorId:
              type: string
              format: uuid
            macAddress:
              type: string
            serialNumber:
              type: string
            created:
              type: integer
              format: int64
            completed:
              type: integer
              format: int64
            error:
              type: integer
              format: int64
            status:
              type: string
            statusCode:
              type: integer
              format: int64
            registrationId:
              type: string
              minLength: 4
              maxLength: 16

    Variable:
      type: object
      properties:
        type:
          type: string
          enum:
            - integer
            - string
            - float
            - boolean
            - variable
            - json
        weight:
          type: integer
          format: int64
        prefix:
          type: string
        value:
          type: string

    VariableList:
      type: object
      properties:
        variables:
          type: array
          items:
            $ref: '#/components/schemas/Variable'

    VariableBlock:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/Variable'
        entity:
          type: string
          format: uuid
        venue:
          type: string
          format: uuid
        subscriber:
          type: string
          format: uuid
        inventory:
          type: string
          format: uuid
        inUse:
          type: array
          items:
            type: string
            format: uuid

    VariableBlockList:
      type: object
      properties:
        variableBlocks:
          type: array
          items:
            $ref: '#/components/schemas/VariableBlock'

    ServiceClass:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        operatorId:
          type: string
          format: uuid
        cost:
          type: number
        currency:
          type: string
          minLength: 3
          maxLength: 3
        managementPolicy:
          type: string
          format: uuid
        period:
          type: string
          enum:
            - hourly
            - daily
            - monthly
            - yearly
            - quarterly
            - lifetime
            - custom1
            - custom2
            - custom3
            - custom4
          default: monthly
        billingCode:
          type: string
        variables:
          type: array
          items:
            $ref: '#/components/schemas/Variable'
        defaultService:
          type: boolean
          default: false

    ServiceClassList:
      type: object
      properties:
        serviceClasses:
          type: array
          items:
            $ref: '#/components/schemas/ServiceClass'

    Operator:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/Variable'
        defaultOperator:
          type: boolean
          default: false
        deviceRules:
          $ref: '#/components/schemas/DeviceRules'
        managementPolicy:
          type: string
          format: uuid
        managementRoles:
          $ref: '#/components/schemas/ManagementRoleList'
        sourceIP:
          $ref: '#/components/schemas/StringList'
        registrationId:
          type: string
          minLength: 4
          maxLength: 16
        entityId:
          description: Generated entity assigned to this operator
          type: string
          format: uuid
          readOnly: true

    OperatorList:
      type: object
      properties:
        operators:
          type: array
          items:
            $ref: '#/components/schemas/Operator'

    SubscriberDevice:
      type: object
      properties:
        allOf:
          $ref: '#/components/schemas/ObjectInfo'
        serialNumber:
          type: string
        realMacAddress:
          type: string
        operatorId:
          type: string
          format: uuid
        deviceType:
          type: string
        deviceGroup:
          type: string
          description: Device group role. `olg` marks the first subscriber device and `ap` marks additional subscriber devices.
          example: olg
        subscriberId:
          type: string
          format: uuid
        qrCode:
          type: string
        geoCode:
          type: string
        location:
          $ref: '#/components/schemas/SubLocation'
        contact:
          $ref: '#/components/schemas/SubContact'
        deviceRules:
          $ref: '#/components/schemas/DeviceRules'
        state:
          type: string
        locale:
          type: string
          minLength: 2
          maxLength: 2
        managementPolicy:
          type: string
          format: uuid
        suspended:
          type: boolean
          default: false
        deviceConfiguration:
          type: string
          format: uuid
        configuration:
          type: array
          deprecated: true
          description: Legacy inline configuration payload. If provided, owprov will store it in configurations and link via deviceConfiguration.
          items:
            $ref: '#/components/schemas/DeviceConfigurationElement'
        serviceClass:
          type: string
          format: uuid
        billingCode:
          type: string

    SubscriberDeviceList:
      type: object
      properties:
        subscriberDevices:
          type: array
